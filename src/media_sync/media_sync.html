<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Media Player - MediaSync</title>
    <link rel="stylesheet" href="media_sync.css"></link>
    <script src="lib_nnls.js"></script>
    <script src="lib_chordino.js"></script>
</head>

<body>
    <h2>Media Player - MediaSync</h2>

    <!-- Connection -->
    <div class="status-row">
        <span class="dot" id="dot"></span>
        <span class="status-text" id="statusText">Connecting</span>
        <button class="reconnect-btn" id="reconnectBtn" hidden>Reconnect</button>
    </div>

    <!-- File picker -->
    <div class="file-row">
        <input type="file" id="fileInput">
        <button class="file-btn" id="videoBtn">Choose Video</button>
        <button class="file-btn" id="audioBtn">Choose Audio</button>
        <span class="file-info" id="fileInfo">No media file selected</span>
    </div>

    <!-- Media -->
    <div class="media-wrap">
        <video id="video" controls playsinline></video>
        <audio id="audio" controls></audio>
        <div class="no-media" id="noMediaMsg">Select a media file to begin</div>
    </div>

    <!-- Chord Detection -->
    <div class="config-row chord-row">
        <span class="row-title">Chord</span>
        <div class="row-fields">
            <div class="chord-toggle-field">
                <label class="toggle-switch">
                    <input type="checkbox" id="chordToggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="chord-toggle-label" id="chordToggleLabel">Off</span>
            </div>
            <div class="chord-display" id="chordDisplay">
                <span class="chord-name" id="chordName">--</span>
                <span class="chord-time" id="chordTime"></span>
            </div>
        </div>
    </div>

    <!-- Chord Timeline -->
    <div class="chord-timeline-wrap" id="chordTimelineWrap">
        <div class="chord-timeline" id="chordTimeline"></div>
        <div class="chord-playhead" id="chordPlayhead"></div>
    </div>

    <!-- Sync Settings -->
    <div class="config-row">
        <span class="row-title">Sync</span>
        <div class="row-fields">
            <div class="sync-field">
                <label for="offsetInput">Offset (s):</label>
                <input type="number" id="offsetInput" value="0" step="0.1">
            </div>
            <div class="sync-field">
                <label for="toleranceInput">Tolerance (ms):</label>
                <input type="number" id="toleranceInput" value="100" step="10" min="10" max="1000">
            </div>
        </div>
    </div>

    <!-- Audio Controls -->
    <div class="config-row">
        <span class="row-title">Audio</span>
        <div class="row-fields">
            <div class="audio-field">
                <label>Pan:</label>
                <span class="slider-label">L</span>
                <input type="range" id="panInput" min="-1" max="1" step="0.1" value="0">
                <span class="slider-label">R</span>
                <span class="slider-value" id="panValue">Center</span>
            </div>
            <div class="audio-field">
                <label>Vol:</label>
                <span class="slider-label">-</span>
                <input type="range" id="volumeInput" min="0" max="2" step="0.1" value="1">
                <span class="slider-label">+</span>
                <span class="slider-value" id="volumeValue">100%</span>
            </div>
        </div>
    </div>

    <!-- Advanced Settings (collapsed by default) -->
    <div class="section-header" id="advHeader">
        <span class="arrow" id="advArrow">▶</span>
        <span>Advanced Settings</span>
    </div>
    <div class="section-body" id="advBody">
        <button class="danger-btn" id="clearStorageBtn">Clear Config Memory</button>
    </div>

    <!-- Debug log -->
    <div class="section-header" id="logHeader">
        <span class="arrow" id="logArrow">▶</span>
        <span>WebSocket Log</span>
    </div>
    <pre id="log"></pre>

    <script>
        // DOM refs
        var dot = document.getElementById('dot');
        var statusText = document.getElementById('statusText');
        var reconnectBtn = document.getElementById('reconnectBtn');
        var fileInput = document.getElementById('fileInput');
        var videoBtn = document.getElementById('videoBtn');
        var audioBtn = document.getElementById('audioBtn');
        var fileInfo = document.getElementById('fileInfo');
        var video = document.getElementById('video');
        var audio = document.getElementById('audio');
        var noMediaMsg = document.getElementById('noMediaMsg');
        var offsetInput = document.getElementById('offsetInput');
        var toleranceInput = document.getElementById('toleranceInput');
        var panInput = document.getElementById('panInput');
        var panValue = document.getElementById('panValue');
        var volumeInput = document.getElementById('volumeInput');
        var volumeValue = document.getElementById('volumeValue');
        var advHeader = document.getElementById('advHeader');
        var advArrow = document.getElementById('advArrow');
        var advBody = document.getElementById('advBody');
        var clearStorageBtn = document.getElementById('clearStorageBtn');
        var logEl = document.getElementById('log');
        var logHeader = document.getElementById('logHeader');
        var logArrow = document.getElementById('logArrow');
        var chordToggle = document.getElementById('chordToggle');
        var chordToggleLabel = document.getElementById('chordToggleLabel');
        var chordName = document.getElementById('chordName');
        var chordDisplay = document.getElementById('chordDisplay');
        var chordTimeEl = document.getElementById('chordTime');
        var chordTimeline = document.getElementById('chordTimeline');
        var chordTimelineWrap = document.getElementById('chordTimelineWrap');
        var chordPlayhead = document.getElementById('chordPlayhead');

        // State
        var mediaReady = false;
        var activeMedia = null;
        var ws = null;

        // Web Audio graph: source → gain → panner → destination
        var audioCtx = null;
        var panner = null;
        var gainNode = null;
        var sourceMap = new WeakMap();

        // Chord detection state (Chordino offline)
        var chordEnabled = false;
        var mediaFile = null;           // File object for offline decoding
        var chordProcessing = false;    // true while analysis is running

        // Chord timeline state
        var chordTimelineData = []; // [{ time, endTime, chord, root, cssRoot, suffix, confidence, altLabel, candidates }, ...]
        var PX_PER_SECOND = 60;

        function ensureAudioGraph(el) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                panner = audioCtx.createStereoPanner();
                gainNode.connect(panner);
                panner.connect(audioCtx.destination);
            }
            if (!sourceMap.has(el)) {
                var src = audioCtx.createMediaElementSource(el);
                src.connect(gainNode);
                sourceMap.set(el, true);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function updatePanDisplay() {
            var v = parseFloat(panInput.value);
            panValue.textContent = v < 0 ? 'L' + Math.abs(v * 100) + '%' : v > 0 ? 'R' + (v * 100) + '%' : 'Center';
        }

        function updateVolumeDisplay() {
            volumeValue.textContent = Math.round(parseFloat(volumeInput.value) * 100) + '%';
        }

        // Config storage
        const STORAGE_KEY = 'media_sync_configs';

        function loadConfigs() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch (e) { return {}; }
        }

        function saveConfigs(configs) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(configs));
            } catch (e) {
                appendLog('[!] Failed to save settings to localStorage');
            }
        }

        function applyConfigForFile(filename) {
            var configs = loadConfigs();
            var cfg = configs[filename];
            offsetInput.value = (cfg && cfg.offset !== undefined) ? cfg.offset : 0;
            toleranceInput.value = (cfg && cfg.tolerance !== undefined) ? cfg.tolerance : 100;
            panInput.value = (cfg && cfg.pan !== undefined) ? cfg.pan : 0;
            volumeInput.value = (cfg && cfg.volume !== undefined) ? cfg.volume : 1;
            updatePanDisplay();
            updateVolumeDisplay();
            appendLog('[cfg] ' + (cfg ? 'Loaded saved' : 'Applied default') + ' settings for "' + filename + '"');
        }

        function saveConfigForFile(filename) {
            var configs = loadConfigs();
            configs[filename] = {
                offset: parseFloat(offsetInput.value) || 0,
                tolerance: parseInt(toleranceInput.value) || 100,
                pan: parseFloat(panInput.value) || 0,
                volume: parseFloat(volumeInput.value),
                savedAt: new Date().toISOString()
            };
            saveConfigs(configs);
            appendLog('[cfg] Saved settings for "' + filename + '"');
        }

        function clearAllConfigs() {
            localStorage.removeItem(STORAGE_KEY);
            appendLog('[cfg] All saved settings cleared');
        }

        // Helpers
        function appendLog(text) {
            var lines = logEl.textContent.trim().split('\n');
            lines.push(text);
            if (lines.length > 1000) lines = lines.slice(-1000);
            logEl.textContent = lines.join('\n');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function getOffset() {
            var v = parseFloat(offsetInput.value);
            return isNaN(v) ? 0 : v;
        }

        function getTolerance() {
            var v = parseInt(toleranceInput.value);
            return isNaN(v) ? 100 : v;
        }

        // Collapsible sections
        function makeCollapsible(headerEl, arrowEl, bodyEl) {
            headerEl.addEventListener('click', function () {
                var open = bodyEl.classList.toggle('open');
                arrowEl.classList.toggle('open', open);
            });
        }

        makeCollapsible(logHeader, logArrow, logEl);
        makeCollapsible(advHeader, advArrow, advBody);

        // Advanced settings
        clearStorageBtn.addEventListener('click', clearAllConfigs);

        // Reconnect
        reconnectBtn.addEventListener('click', function () {
            reconnectBtn.hidden = true;
            dot.className = 'dot';
            statusText.textContent = 'Connecting';
            appendLog('[+] Reconnecting to server at ' + WS_URL);
            connectWS();
        });

        // File picker
        videoBtn.addEventListener('click', function () {
            fileInput.accept = 'video/*';
            fileInput.click();
        });

        audioBtn.addEventListener('click', function () {
            fileInput.accept = 'audio/*';
            fileInput.click();
        });

        fileInput.addEventListener('change', function () {
            var file = fileInput.files[0];
            if (!file) return;

            // Pick the target element from the file's MIME type prefix.
            var isAudio = file.type.indexOf('audio/') === 0;
            activeMedia = isAudio ? audio : video;
            var inactive = isAudio ? video : audio;
            mediaFile = file;  // store for offline chord analysis

            inactive.pause();
            inactive.removeAttribute('src');
            inactive.load();
            inactive.style.display = 'none';
            activeMedia.style.display = 'block';

            fileInfo.textContent = file.name + ' (Loading)';
            noMediaMsg.style.display = 'none';

            applyConfigForFile(file.name);
            ensureAudioGraph(activeMedia);
            panner.pan.value = parseFloat(panInput.value) || 0;
            gainNode.gain.value = parseFloat(volumeInput.value);

            activeMedia.src = URL.createObjectURL(file);
            activeMedia.load();
            mediaReady = false;
            resetChordDisplay();
        });

        // Media events (shared by video and audio)
        function wireMediaEvents(el) {
            el.addEventListener('loadedmetadata', function () {
                mediaReady = true;
                var dur = el.duration;
                var name = fileInput.files[0] ? fileInput.files[0].name : 'unknown';
                fileInfo.textContent = name + '  (' + dur.toFixed(1) + 's)';
                chordTimeline.style.width = (dur * PX_PER_SECOND) + 'px';
                // Auto-run chord analysis if chord mode is already enabled
                if (chordEnabled) runChordAnalysis();
            });

            el.addEventListener('error', function () {
                mediaReady = false;
                fileInfo.textContent = 'Error loading media';
            });
        }

        wireMediaEvents(video);
        wireMediaEvents(audio);

        // Config change events
        offsetInput.addEventListener('change', function () {
            if (fileInput.files[0]) {
                saveConfigForFile(fileInput.files[0].name);
            }
        });

        toleranceInput.addEventListener('change', function () {
            if (fileInput.files[0]) {
                saveConfigForFile(fileInput.files[0].name);
            }
        });

        panInput.addEventListener('input', function () {
            if (panner) {
                panner.pan.value = parseFloat(panInput.value) || 0;
            }
            updatePanDisplay();
        });

        panInput.addEventListener('change', function () {
            if (fileInput.files[0]) {
                saveConfigForFile(fileInput.files[0].name);
            }
        });

        volumeInput.addEventListener('input', function () {
            if (gainNode) {
                gainNode.gain.value = parseFloat(volumeInput.value);
            }
            updateVolumeDisplay();
        });

        volumeInput.addEventListener('change', function () {
            if (fileInput.files[0]) {
                saveConfigForFile(fileInput.files[0].name);
            }
        });

        // Chord detection (Chordino offline)
        function resetChordDisplay() {
            chordName.textContent = '--';
            chordTimelineData = [];
            chordTimeline.innerHTML = '';
            chordPlayhead.style.transform = '';
            chordTimeline.style.transform = 'translateX(0px)';
            chordTimeline.style.width = '0px';
            chordTimeEl.textContent = '';
            chordProcessing = false;
        }

        // Timeline batch rendering
        function renderAllTimelineBlocks(results) {
            chordTimeline.innerHTML = '';
            chordTimeline.style.width = activeMedia ?
                Math.ceil(activeMedia.duration * PX_PER_SECOND) + 'px' : '0px';

            for (var i = 0; i < results.length; i++) {
                var entry = results[i];
                var block = document.createElement('div');
                block.className = 'chord-block root-' + entry.cssRoot;
                var leftPx = Math.round(entry.time * PX_PER_SECOND);
                var rightPx = Math.round(entry.endTime * PX_PER_SECOND);
                block.style.left = leftPx + 'px';
                block.style.width = Math.max(2, rightPx - leftPx) + 'px';

                var labelText = entry.altLabel || entry.chord;
                block.textContent = labelText;
                chordTimeline.appendChild(block);
            }
        }

        // Offline chord analysis
        function runChordAnalysis() {
            if (!mediaFile || chordProcessing) return;
            chordProcessing = true;
            chordTimeEl.textContent = 'Processing: 0%';

            var reader = new FileReader();
            reader.onload = function (e) {
                audioCtx.decodeAudioData(e.target.result, function (audioBuffer) {
                    var chordino = new Chordino(audioCtx.sampleRate, {
                        onProgress: function (p) {
                            chordTimeEl.textContent = 'Processing: ' + Math.round(p * 100) + '%';
                        }
                    });
                    chordino.process(audioBuffer, function (results) {
                        chordTimelineData = results;
                        renderAllTimelineBlocks(results);
                        chordProcessing = false;
                        chordTimeEl.textContent = '';
                    });
                }, function () {
                    chordProcessing = false;
                    chordTimeEl.textContent = 'Decode error';
                });
            };
            reader.onerror = function () {
                chordProcessing = false;
                chordTimeEl.textContent = 'Read error';
            };
            reader.readAsArrayBuffer(mediaFile);
        }

        // Playhead tracking and chord display
        function updateChordPlayhead() {
            requestAnimationFrame(updateChordPlayhead);
            if (!chordEnabled || !activeMedia || !activeMedia.duration) return;

            // Update playhead position via timeline content translate
            var playheadX = activeMedia.currentTime * PX_PER_SECOND;
            var wrapWidth = chordTimelineWrap.clientWidth;
            chordTimeline.style.transform = 'translateX(' + (wrapWidth / 2 - playheadX) + 'px)';

            // Display the chord at the current playback position
            var currentTime = activeMedia.currentTime;
            var currentChord = '--';
            var currentAlt = null;
            for (var i = 0; i < chordTimelineData.length; i++) {
                if (chordTimelineData[i].time <= currentTime &&
                    chordTimelineData[i].endTime > currentTime) {
                    currentChord = chordTimelineData[i].chord;
                    currentAlt = chordTimelineData[i].altLabel;
                    break;
                }
            }
            chordName.textContent = currentAlt || currentChord;
        }
        updateChordPlayhead();  // start the playhead loop (dormant until chordEnabled)

        chordToggle.addEventListener('change', function () {
            chordEnabled = chordToggle.checked;
            chordToggleLabel.textContent = chordEnabled ? 'On' : 'Off';
            chordDisplay.classList.toggle('active', chordEnabled);
            chordTimelineWrap.classList.toggle('open', chordEnabled);
            if (chordEnabled) {
                runChordAnalysis();
            } else {
                resetChordDisplay();
            }
        });

        // WebSocket
        const WS_URL = 'ws://localhost:8084';

        function sendWS(msg) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                appendLog('[!] WS not connected');
                return;
            }
            ws.send(msg);
            appendLog('→ ' + msg);
        }

        function connectWS() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

            ws = new WebSocket(WS_URL);

            reconnectBtn.hidden = true;

            ws.onopen = function () {
                sendWS('{"type":"client_hello"}');
            };

            ws.onmessage = function (e) {
                appendLog('← ' + e.data);

                try {
                    var cmd = JSON.parse(e.data);
                } catch (err) {
                    appendLog('[!] Invalid message received');
                    return;
                }

                // Lifecycle messages
                if (cmd.type === 'server_hello') {
                    dot.className = 'dot connected';
                    statusText.textContent = 'Connected';
                    return;
                }

                if (cmd.type === 'shutdown') {
                    dot.className = 'dot disconnected';
                    statusText.textContent = 'Shutdown';
                    if (ws) {
                        ws.onclose = null;
                        ws.close();
                        ws = null;
                    }
                    window.close();
                    return;
                }

                if (!mediaReady) {
                    appendLog('[!] No media loaded yet');
                    return;
                }

                // Playback messages
                var offset = getOffset();
                var toleranceSec = getTolerance() / 1000; // ms to seconds
                var targetTime;

                switch (cmd.type) {
                    case 'play':
                        targetTime = cmd.position + offset;
                        if (targetTime < 0) targetTime = 0;
                        if (Math.abs(activeMedia.currentTime - targetTime) > toleranceSec) {
                            activeMedia.currentTime = targetTime;
                        }
                        activeMedia.play().catch(function () { });
                        break;

                    case 'pause':
                        activeMedia.pause();
                        break;

                    case 'seek':
                        targetTime = cmd.position + offset;
                        if (targetTime < 0) targetTime = 0;
                        if (targetTime > activeMedia.duration) targetTime = activeMedia.duration;
                        activeMedia.currentTime = targetTime;
                        break;

                    default:
                        appendLog('[!] Unknown command type: ' + cmd.type);
                }
            };

            ws.onclose = function () {
                dot.className = 'dot disconnected';
                statusText.textContent = 'Disconnected';
                reconnectBtn.hidden = false;
                appendLog('[!] WS disconnected');
            };

            ws.onerror = function () {
                dot.className = 'dot disconnected';
                statusText.textContent = 'Connection error';
                reconnectBtn.hidden = false;
                appendLog('[!] WS error');
            };
        }

        // Start
        connectWS();
        appendLog('[+] Connecting to server at ' + WS_URL);
    </script>
</body>

</html>
